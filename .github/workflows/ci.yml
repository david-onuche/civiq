name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # CI builds use a non-secret sample Firebase config so the
      # Google Services plugin can run without real project credentials.
      - name: Provide sample Firebase config
        run: cp app/google-services.sample.json app/google-services.json

      - name: Run unit tests (devDebug)
        run: ./gradlew testDevDebugUnitTest

      - name: Run lint (devDebug)
        run: ./gradlew lintDevDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-devDebug.html
          retention-days: 7
