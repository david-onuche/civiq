name: Bug report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include screenshots, logs, or stack traces if available.
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: e.g. Pixel 8, Android 15
    validations:
      required: true

  - type: input
    id: build
    attributes:
      label: App version / build variant
      placeholder: e.g. devDebug 0.1.0-debug
    validations:
      required: false

  - type: dropdown
    id: role
    attributes:
      label: Account role (if relevant)
      options:
        - Not signed in / Guest
        - Registered
        - Premium
        - Admin
        - Not applicable
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
